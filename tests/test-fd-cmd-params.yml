name: Test fd_cmd_params parameter
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdown link checker with custom fd params
        id: action
        uses: .
        with:
          fd_cmd_params: >-
            . -0 --extension md --type f --hidden --no-ignore
            tests/fixtures/subdir
          verbose: "true"
      - name: Assert action succeeded with custom fd params
        run: |
          echo "Action completed with custom fd params successfully"
          echo "PASS"
