name: Test debug mode - enable verbose debug output
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify fixture file exists
        run: |
          ls -la "$GITHUB_WORKSPACE/tests/fixtures/debug/"
          cat "$GITHUB_WORKSPACE/tests/fixtures/debug/test.md"

      - name: Run action in debug mode
        id: action
        uses: .
        with:
          search_paths: ${{ github.workspace }}/tests/fixtures/debug
          debug: "true"

      - name: Assert action succeeded in debug mode
        run: |
          echo "PASS: action completed successfully in debug mode"
