name: Test exclude input - skip certain files or directories
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify fixture files exist
        run: |
          ls -la "$GITHUB_WORKSPACE/tests/fixtures/exclude/"
          ls -la "$GITHUB_WORKSPACE/tests/fixtures/exclude/bad/"
          ls -la "$GITHUB_WORKSPACE/tests/fixtures/exclude/good/"

      - name: Run action with exclude to skip the bad directory
        id: action
        uses: .
        with:
          search_paths: ${{ github.workspace }}/tests/fixtures/exclude
          exclude: bad
          verbose: "true"

      - name: Assert action succeeded (bad file was excluded)
        run: |
          echo "PASS: action completed successfully - bad directory was excluded"
