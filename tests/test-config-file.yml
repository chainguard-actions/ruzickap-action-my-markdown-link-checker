name: Test config file parameter
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdown link checker with config file
        id: action
        uses: .
        with:
          config_file: tests/fixtures/mlc_config.json
          search_paths: |
            tests/fixtures/excluded
      - name: Assert action succeeded with config file
        run: |
          echo "Action completed with config file successfully"
          echo "PASS"
