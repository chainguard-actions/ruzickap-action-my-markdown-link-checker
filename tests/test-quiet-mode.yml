name: Test quiet mode - suppress output for passing links
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify fixture file exists
        run: |
          ls -la "$GITHUB_WORKSPACE/tests/fixtures/quiet/"
          cat "$GITHUB_WORKSPACE/tests/fixtures/quiet/valid.md"

      - name: Run action in quiet mode
        id: action
        uses: .
        with:
          search_paths: ${{ github.workspace }}/tests/fixtures/quiet
          quiet: "true"

      - name: Assert action succeeded in quiet mode
        run: |
          echo "PASS: action completed successfully in quiet mode"
