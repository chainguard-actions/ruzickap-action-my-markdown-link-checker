name: Test fd_cmd_params input - custom fd command parameters
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify fixture file exists
        run: |
          ls -la "$GITHUB_WORKSPACE/tests/fixtures/fd-params/docs/"
          cat "$GITHUB_WORKSPACE/tests/fixtures/fd-params/docs/readme.md"

      - name: Run action with custom fd_cmd_params to only scan docs directory
        id: action
        uses: .
        with:
          fd_cmd_params: . -0 --extension md --type f --hidden --no-ignore ${{ github.workspace }}/tests/fixtures/fd-params/docs
          verbose: "true"

      - name: Assert action succeeded (only docs directory was scanned)
        run: |
          echo "PASS: action completed successfully with custom fd_cmd_params"
