name: Test config_file input - use custom markdown-link-check config
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify fixture files exist
        run: |
          ls -la "$GITHUB_WORKSPACE/tests/fixtures/config-file/"
          cat "$GITHUB_WORKSPACE/tests/fixtures/config-file/mlc_config.json"
          cat "$GITHUB_WORKSPACE/tests/fixtures/config-file/test.md"

      - name: Run action with custom config file that ignores localhost links
        id: action
        uses: .
        with:
          config_file: ${{ github.workspace }}/tests/fixtures/config-file/mlc_config.json
          search_paths: ${{ github.workspace }}/tests/fixtures/config-file
          verbose: "true"

      - name: Assert action succeeded (localhost link was ignored by config)
        run: |
          echo "PASS: action completed successfully with custom config file"
