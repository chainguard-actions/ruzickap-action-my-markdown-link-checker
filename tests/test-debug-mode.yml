name: Test debug mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a simple markdown file for testing
        run: |
          mkdir -p /tmp/md-test
          cat > /tmp/md-test/README.md << 'EOF'
          # Test

          This is a test markdown file with no external links.
          EOF
      - id: action
        uses: .
        with:
          debug: "true"
          search_paths: /tmp/md-test
      - name: Assert action completed successfully
        run: |
          echo "Action completed with debug mode enabled"
          echo "PASS"
