name: Test exclude functionality
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run markdown link checker excluding broken-links file
        id: action
        uses: .
        with:
          search_paths: tests/fixtures
          exclude: tests/fixtures/broken-links.md
      - name: Assert action succeeded with exclusion
        run: |
          echo "Action completed successfully with exclusion"
          echo "PASS"
