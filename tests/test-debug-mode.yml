  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          debug: "true"
          search_paths: "."
      - name: Assert action completed successfully
        run: |
          echo "PASS: action completed with debug mode enabled"
