name: Test exclude files from markdown link checking
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test markdown files
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-docs/included"
          mkdir -p "$GITHUB_WORKSPACE/test-docs/excluded"

          cat > "$GITHUB_WORKSPACE/test-docs/included/good.md" << 'EOF'
          # Good Document

          [GitHub](https://github.com)
          EOF

          # This file has a broken link but should be excluded
          cat > "$GITHUB_WORKSPACE/test-docs/excluded/broken.md" << 'EOF'
          # Broken Links Document

          [Broken Link](https://this-domain-does-not-exist-at-all-xyz123.invalid)
          EOF

      - name: Run markdown link checker with exclusion
        id: action
        uses: .
        with:
          search_paths: test-docs
          exclude: test-docs/excluded

      - name: Assert action completed successfully with exclusion
        run: |
          echo "PASS: action completed with excluded directory without error"
